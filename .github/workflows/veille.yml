name: Veille des annonces (serveur)

# Le "serveur" gratuit de ChercheAppart : toutes les 30 min, interroge Bien'ici
# pour chaque recherche de chaque utilisateur (Supabase) et notifie les nouveautés.

on:
  schedule:
    - cron: "*/30 * * * *"   # toutes les 30 minutes
  workflow_dispatch:

concurrency:
  group: veille
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      # Garde : si les secrets ne sont pas configurés, on s'arrête proprement
      # (pas d'échec, pas d'installation inutile) — voir SETUP.md.
      - name: Vérifier la configuration
        id: cfg
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Secrets Supabase absents — veille en veille (voir SETUP.md)."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.cfg.outputs.run == 'true'
        uses: actions/checkout@v4

      - if: steps.cfg.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"          # supabase-js requiert le WebSocket natif (Node 22+)
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - if: steps.cfg.outputs.run == 'true'
        name: Installer les dépendances
        working-directory: backend
        run: npm ci || npm install

      - if: steps.cfg.outputs.run == 'true'
        name: Lancer la veille
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: node veille.mjs
