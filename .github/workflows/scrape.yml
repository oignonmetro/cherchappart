name: Veille des annonces

# Le moteur de ChercheAppart : tourne régulièrement, récupère les annonces
# et met à jour data/listings.json (lu par le site GitHub Pages).

on:
  schedule:
    - cron: "0 */3 * * *"   # toutes les 3 heures (UTC)
  workflow_dispatch:          # déclenchement manuel possible

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r scraper/requirements.txt

      - name: Lancer la veille
        run: python scraper/scrape.py

      - name: Commit des nouvelles annonces
        run: |
          git config user.name  "chercheappart-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/listings.json)" ]; then
            git add data/listings.json
            git commit -m "Veille: mise à jour des annonces ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "Aucune nouvelle annonce."
          fi
